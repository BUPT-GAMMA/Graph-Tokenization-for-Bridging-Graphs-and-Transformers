## Limit test discovery to the dedicated tests directory
[pytest]
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q -s -m "not e2e" -k "not slow"

markers =
    slow: 慢测试（可能涉及训练或大计算），可通过 -k 'not slow' 跳过
    e2e: 端到端测试（默认不运行，需显式 -m e2e 才会执行）

filterwarnings =
    # 第三方库 'outdated' 触发的告警：提示 pkg_resources 将被弃用
    ignore:.*pkg_resources is deprecated.*:UserWarning:outdated
    ignore:.*Outdated.*
    ignore:.*latest version.*No
    # 忽略 outdated 包的所有警告类
    ignore::outdated.mywarnings.OutdatedCheckFailedWarning
    ignore::outdated.mywarnings.OutdatedCacheFailedWarning
    ignore::outdated.mywarnings.OutdatedPackageWarning
    ignore:Failed to check for latest version.*:Warning
    # 来自 setuptools/pkg_resources 的命名空间弃用告警（mpl_toolkits/google/sphinxcontrib/zope 等）
    ignore:Deprecated call to `pkg_resources\.declare_namespace.*:DeprecationWarning:pkg_resources

