# TokenizerGraph 默认配置
# ===================

# 系统配置
system:
  seed: 42  # 固定随机种子，确保可重现性
  device: auto  # auto=自动选择GPU/CPU
  num_workers: 4  # 数据加载器线程数
  persistent_workers: true  # DataLoader常驻worker，利于后端实例常驻
  log_style: online  # online=使用tqdm进度条; offline=每个epoch按10%输出摘要

# 路径配置
paths:
  data_dir: data/
  cache_dir: cache/
  processed_dir: data/processed
  model_dir: model
  log_dir: log

# 数据集配置
dataset:
  name: qm9  # 数据集名称 (使用DGL格式)
  limit: null  # null=全量, 13083=10%, 26166=20%, 65415=50%
  use_cache: true
  splits:  # 数据分割比例
    train: 0.8
    val: 0.1
    test: 0.1
  transforms:
    # 运行时数据变换配置（在数据加载时应用）
    normalize: false
    augment: false

# 序列化配置
serialization:
  method: feuler  # feuler(原 graph_seq), topo(topological), eulerian, smiles
  # 多重采样配置（仅适用于支持随机性的序列化方法）
  multiple_sampling:
    enabled: true          # 是否启用多重采样
    num_realizations: 10     # 每个图的采样次数
    flatten_variants: true  # 是否将多个采样结果平铺为独立样本
  bpe:  # BPE压缩配置
    enabled: true
    num_merges: 3000
    min_frequency: 100
    # 统一 BPEEngine 配置（训练与编码后端、rank-limit 策略）
    engine:
      train_backend: numba   # numba | python
      encode_backend: cpp    # 仅支持 cpp
      encode_rank_mode: all  # none | all | topk | random | gaussian
      encode_rank_k: null    # topk 固定值；random/gaussian 时可留空使用默认区间
      encode_rank_min: null  # random/gaussian 下限；留空则默认 0
      encode_rank_max: null  # random/gaussian 上限；留空则默认 len(merge_rules)
      encode_rank_dist: uniform  # random: uniform|triangular；gaussian 忽略该项

# 编码后端配置（用于在线encode）
encoding:
  backend: numba  # 可选: py-standard | numba | cpp （无隐式回退，缺失即报错）
  threads:
    omp_num_threads: 1
    mkl_num_threads: 1

# BERT模型配置
bert:
  # 模型架构 (基于BERT-Small)
  architecture:
    vocab_size: null  # 由数据统计自动确定
    hidden_size: 512  # d_model
    num_attention_heads: 4  # n_heads
    num_hidden_layers: 4  # n_layers
    intermediate_size: 2048  # d_ff
    max_seq_length: 768  # 最大上限（effective_max_length 不会超过此值）
    max_len_policy: max
    max_len_sigma_k: 3
    layer_norm_eps: 1e-12
    hidden_dropout_prob: 0.1
    attention_probs_dropout_prob: 0.1
    max_position_embeddings: 768
    type_vocab_size: 2
    initializer_range: 0.02
    pooling_method: mean
  
  # 预训练配置
  pretraining:
    epochs: 5
    batch_size: 128
    learning_rate: 2e-4
    mask_prob: 0.15
    warmup_steps: 1000
    weight_decay: 0.05
    max_grad_norm: 1.0
    save_steps: 1000
    eval_steps: 500
    vocab_min_freq: 1
    max_vocab_size: 5000
    early_stopping_patience: 10
    mlm_augmentation_methods:
      - random_deletion
      - random_insertion
      - random_replacement
      - random_swap
      - random_truncation

  
  # 微调配置
  finetuning:
    epochs: 60
    batch_size: 128
    learning_rate: 5e-5
    weight_decay: 0.15
    head_lr_multiplier: 2.0
    early_stopping_patience: 10
    use_layered_lr: false
    max_grad_norm: 1.0
    regression_augmentation_methods:
      # - random_deletion
      # - random_insertion
      # - random_replacement
      # - random_swap
      # - random_truncation

# 任务配置
task:
  type: regression  # regression, classification
  target_property: null  # 留空表示从数据集元信息自动推断（QM9默认 homo）
  normalization: standard  # standard, minmax, robust

# 日志和监控配置
logging:
  # TensorBoard配置
  use_tensorboard: true
  tensorboard_log_dir: logs/tensorboard
  
  # WandB配置
  use_wandb: true  # 是否启用WandB
  wandb_project: tokenizerGraph  # WandB项目名称（可被环境变量WANDB_PROJECT覆盖）
  wandb_entity: null  # WandB实体名称（可被环境变量WANDB_ENTITY覆盖）
  wandb_offline: true  # 是否强制离线模式（true=离线，false=自动检测，可被环境变量WANDB_MODE覆盖）


# 特殊Token配置（固定，不可修改）
special_tokens:
  pad: "[PAD]"
  unk: "[UNK]"
  mask: "[MASK]"
  cls: "[CLS]"
  sep: "[SEP]"
  node_start: "[NODE_START]"
  node_end: "[NODE_END]"
  component_sep: "[COMP_SEP]"  # 连通分量分隔符
  ids:  # 对应的ID（固定顺序）
    pad: 0
    unk: 1
    mask: 2
    cls: 3
    sep: 4
    node_start: 5
    node_end: 6
    component_sep: 7  # 连通分量分隔符ID