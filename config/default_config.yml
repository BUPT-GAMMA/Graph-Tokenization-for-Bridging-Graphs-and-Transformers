# TokenizerGraph 默认配置
# ===================

# 全局开关：是否在编码器创建时重置权重（丢弃预训练知识）
# true: 重置权重到初始状态（用于从头训练）；false: 使用默认初始化或后续加载的预训练权重
# 注意：预训练权重加载会覆盖此设置
reset_weights: false

# 系统配置
system:
  seed: 42  # 固定随机种子，确保可重现性
  device: cuda  # auto=自动选择GPU/CPU
  num_workers: 1  # 数据加载器线程数
  persistent_workers: true  # DataLoader常驻worker，利于后端实例常驻
  log_style: online  # online=使用tqdm进度条; offline=每个epoch按10%输出摘要

# 路径配置
paths:
  data_dir: data/
  cache_dir: cache/
  processed_dir: data/processed
  model_dir: model
  log_dir: log

# 数据集配置
dataset:
  name: qm9  # 数据集名称 (使用DGL格式)
  limit: null  # null=全量, 13083=10%, 26166=20%, 65415=50%
  use_cache: true
  splits:  # 数据分割比例
    train: 0.8
    val: 0.1
    test: 0.1
  transforms:
    # 运行时数据变换配置（在数据加载时应用）
    normalize: false
    augment: false

# 序列化配置
serialization:
  method: feuler  # feuler(原 graph_seq), topo(topological), eulerian, smiles
  # 多重采样配置（仅适用于支持随机性的序列化方法）
  multiple_sampling:
    enabled: false          # 是否启用多重采样
    num_realizations: 10     # 每个图的采样次数
    flatten_variants: true  # 是否将多个采样结果平铺为独立样本
  bpe:  # BPE压缩配置
    enabled: true
    num_merges: 2000
    min_frequency: 2
    # 统一 BPEEngine 配置（训练与编码后端、rank-limit 策略）
    engine:
      train_backend: cpp   # python | cpp
      encode_backend: cpp    # 仅支持 cpp
      encode_rank_mode: all  # none | all | topk | random | gaussian
      encode_rank_k: null    # topk 固定值；random/gaussian 时可留空使用默认区间
      encode_rank_min: null  # random/gaussian 下限；留空则默认 0
      encode_rank_max: null  # random/gaussian 上限；留空则默认 len(merge_rules)
      encode_rank_dist: uniform  # random: uniform|triangular；gaussian 忽略该项

# 编码后端配置（用于在线encode）
encoding:
  backend: cpp  # 可选: py-standard | numba | cpp （无隐式回退，缺失即报错）
  threads:
    omp_num_threads: 1
    mkl_num_threads: 1

# 编码器配置
encoder:
  type: bert  # bert | Alibaba-NLP/gte-multilingual-base | 其他编码器
  reset_weights: false
  
# BERT模型配置
bert:
  # 模型架构 (基于BERT-Small)
  architecture:
    vocab_size: null  # 由数据统计自动确定
    hidden_size: 512  # d_model
    num_attention_heads: 4  # n_heads
    num_hidden_layers: 4  # n_layers
    intermediate_size: 2048  # d_ff
    max_seq_length: 8096  # 最大上限（effective_max_length 不会超过此值）
    max_len_policy: max # max | sigma
    max_len_sigma_k: 3
    layer_norm_eps: 1e-12
    hidden_dropout_prob: 0.1
    attention_probs_dropout_prob: 0.1
    max_position_embeddings: 8096
    type_vocab_size: 2
    initializer_range: 0.02
    pooling_method: mean
    # 任务头配置
    task_head:
      hidden_ratio: 0.5  # 中间层大小比例 (替代硬编码的 //2)
      activation: relu   # relu | gelu
      dropout: 0.1       # dropout率
  
  # 预训练配置
  pretraining:
    epochs: 200
    batch_size: 32
    learning_rate: 2e-4
    mask_prob: 0.15
    weight_decay: 0.05
    max_grad_norm: 1.0
    save_steps: 1000
    eval_steps: 500
    vocab_min_freq: 1
    max_vocab_size: 5000
    early_stopping_patience: 30
    mlm_augmentation_methods:
      # - random_deletion  # 这个和下面几种都是要么加了没用，要么加了还会略微变差一点。也不排除是我测试的问题，但是目前初步决定不再采用，只采用swap和r-drop
      - random_swap  # 这个是效果显著最好的。就是只要加了他就能提一截。再往后训练时，那个一致性正则化也只能略微提一点。
      # - random_truncation  # 这个是显著有害。排列组合效果最差的就是使用了这个。
    
    # 数据增强配置
    augmentation_config:
      # 全局控制：是否使用各种增强方法的概率
      random_deletion_probability: 0.3
      random_swap_probability: 0.4
      random_truncation_probability: 0.2
      
      # 比例控制：对整个序列有多少比例的token需要应用增强
      random_deletion_ratio: 0.1      # 10%的token被删除
      random_swap_ratio: 0.05          # 5%的token在窗口内交换
      random_truncation_min_ratio: 0.7 # 保留至少70%的长度
      
      # 交换操作的局部窗口大小
      swap_window_size: 3
      
      # 一致性正则化配置
      use_consistency_regularization: false
      consistency_alpha: 1.0  # R-Drop权重
      
      # 高斯噪声增强
      use_gaussian_noise: true
      gaussian_noise_std: 0.01
      gaussian_noise_probability: 0.3
      
      # 特征混合增强（仅回归任务，实验性）
      use_feature_mixup: false
      feature_mixup_alpha: 0.2
      feature_mixup_probability: 0.2

  
  # 微调配置
  finetuning:
    epochs: 200
    batch_size: 32
    learning_rate: 1e-4
    weight_decay: 0.15
    head_lr_multiplier: 2.0
    early_stopping_patience: 30
    use_layered_lr: false
    max_grad_norm: 1.0
    save_models: false
    regression_augmentation_methods:
      # - random_deletion
      - random_swap
      # - random_truncation
      - sequence_masking
    
    # 数据增强配置
    augmentation_config:
      # 全局控制：是否使用各种增强方法的概率
      random_deletion_probability: 0.3
      random_swap_probability: 0.4
      random_truncation_probability: 0.3
      sequence_masking_probability: 0.3
      
      # 比例控制：对整个序列有多少比例的token需要应用增强
      random_deletion_ratio: 0.1      # 10%的token被删除
      random_swap_ratio: 0.05          # 5%的token在窗口内交换
      random_truncation_min_ratio: 0.7 # 保留至少70%的长度
      sequence_masking_ratio: 0.05     # 5%的token被掩码
      
      # 交换操作的局部窗口大小
      swap_window_size: 3
      
      # 一致性正则化配置
      use_consistency_regularization: false
      consistency_alpha: 1.0  # R-Drop权重
      
      # 高斯噪声增强
      use_gaussian_noise: true
      gaussian_noise_std: 0.01
      gaussian_noise_probability: 0.3
      
      # 特征混合增强（仅回归任务，实验性）
      use_feature_mixup: false
      feature_mixup_alpha: 0.2
      feature_mixup_probability: 0.2

# 任务配置 - 统一管理预训练和微调
task:
  type: mlm  # mlm | regression | classification | binary_classification | multi_label_classification
  target_property: null  # 留空表示从数据集元信息自动推断（QM9默认 homo）
  normalization: standard  # standard, minmax, robust

# 日志和监控配置
logging:
  # TensorBoard配置
  use_tensorboard: true
  tensorboard_log_dir: logs/tensorboard
  
  # WandB配置
  use_wandb: false  # 是否启用WandB
  wandb_project: tokenizerGraph  # WandB项目名称（可被环境变量WANDB_PROJECT覆盖）
  wandb_entity: null  # WandB实体名称（可被环境变量WANDB_ENTITY覆盖）
  wandb_offline: true  # 是否强制离线模式（true=离线，false=自动检测，可被环境变量WANDB_MODE覆盖）


# 特殊Token配置（固定，不可修改）
special_tokens:
  pad: "[PAD]"
  unk: "[UNK]"
  mask: "[MASK]"
  cls: "[CLS]"
  sep: "[SEP]"
  node_start: "[NODE_START]"
  node_end: "[NODE_END]"
  component_sep: "[COMP_SEP]"  # 连通分量分隔符
  ids:  # 对应的ID（固定顺序）
    pad: 0
    unk: 1
    mask: 2
    cls: 3
    sep: 4
    node_start: 5
    node_end: 6
    component_sep: 7  # 连通分量分隔符ID
